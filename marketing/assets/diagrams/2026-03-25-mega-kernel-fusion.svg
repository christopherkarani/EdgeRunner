<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"
     font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif">

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="accent-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0070f3" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0070f3" stop-opacity="0"/>
    </radialGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00cc88" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00cc88" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#ededed"
        font-size="16" font-weight="600">Progressive Kernel Fusion</text>
  <text x="400" y="48" text-anchor="middle" fill="#666"
        font-size="11">5 dispatches → 1 dispatch per transformer layer</text>

  <!-- Divider -->
  <line x1="400" y1="65" x2="400" y2="480"
        stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- LEFT: Before (naive path) -->
  <text x="200" y="75" text-anchor="middle"
        fill="#555" font-size="11" font-weight="600" letter-spacing="1px">BEFORE</text>
  <text x="200" y="90" text-anchor="middle"
        fill="#666" font-size="10">5 separate GPU dispatches</text>

  <!-- Naive dispatch boxes -->
  <g transform="translate(60, 105)">
    <rect width="280" height="38" rx="6" fill="url(#cbg)"
          stroke="#333" stroke-width="1"/>
    <text x="140" y="24" text-anchor="middle" fill="#888" font-size="12">1. Wo GEMV + residual add</text>
  </g>
  <line x1="200" y1="143" x2="200" y2="165" stroke="#444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <g transform="translate(60, 165)">
    <rect width="280" height="38" rx="6" fill="url(#cbg)"
          stroke="#333" stroke-width="1"/>
    <text x="140" y="24" text-anchor="middle" fill="#888" font-size="12">2. RMSNorm</text>
  </g>
  <line x1="200" y1="203" x2="200" y2="225" stroke="#444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <g transform="translate(60, 225)">
    <rect width="280" height="38" rx="6" fill="url(#cbg)"
          stroke="#333" stroke-width="1"/>
    <text x="140" y="24" text-anchor="middle" fill="#888" font-size="12">3. Gate GEMV</text>
  </g>
  <line x1="200" y1="263" x2="200" y2="285" stroke="#444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <g transform="translate(60, 285)">
    <rect width="280" height="38" rx="6" fill="url(#cbg)"
          stroke="#333" stroke-width="1"/>
    <text x="140" y="24" text-anchor="middle" fill="#888" font-size="12">4. Up GEMV + SwiGLU</text>
  </g>
  <line x1="200" y1="323" x2="200" y2="345" stroke="#444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <g transform="translate(60, 345)">
    <rect width="280" height="38" rx="6" fill="url(#cbg)"
          stroke="#333" stroke-width="1"/>
    <text x="140" y="24" text-anchor="middle" fill="#888" font-size="12">5. Down GEMV + residual add</text>
  </g>

  <!-- Barrier symbols between naive boxes -->
  <text x="355" y="125" fill="#555" font-size="9">→barrier→</text>
  <text x="355" y="205" fill="#555" font-size="9">→barrier→</text>
  <text x="355" y="265" fill="#555" font-size="9">→barrier→</text>
  <text x="355" y="325" fill="#555" font-size="9">→barrier→</text>

  <!-- Naive total -->
  <g transform="translate(60, 395)">
    <rect width="280" height="28" rx="14"
          fill="#333" fill-opacity="0.5" stroke="#555" stroke-width="1"/>
    <text x="140" y="18" text-anchor="middle" fill="#888" font-size="11">5 dispatches · 4 barriers</text>
  </g>

  <!-- RIGHT: After (mega-kernel) -->
  <text x="600" y="75" text-anchor="middle"
        fill="#0070f3" font-size="11" font-weight="600" letter-spacing="1px">AFTER</text>
  <text x="600" y="90" text-anchor="middle"
        fill="#666" font-size="10">1 mega-kernel · 0 barriers (SIMD only)</text>

  <!-- Mega-kernel box -->
  <g transform="translate(430, 100)">
    <ellipse cx="170" cy="90" rx="180" ry="100" fill="url(#accent-glow)"/>
    <rect width="340" height="180" rx="12" fill="url(#cbg)"
          stroke="#0070f3" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="170" y="24" text-anchor="middle" fill="#0070f3"
          font-size="13" font-weight="600">dequant_q8_0_fused_ffn_block</text>

    <line x1="20" y1="36" x2="320" y2="36" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="20" y="58" fill="#ededed" font-size="11">Phase 1: Wo GEMV + residual add</text>
    <text x="20" y="76" fill="#ededed" font-size="11">Phase 2: Cooperative RMSNorm</text>
    <text x="20" y="94" fill="#ededed" font-size="11">Phase 3: Gate + Up + SwiGLU GEMVs</text>
    <text x="20" y="112" fill="#ededed" font-size="11">Phase 4: Down GEMV + residual</text>

    <line x1="20" y1="124" x2="320" y2="124" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="20" y="144" fill="#888" font-size="10">1024 threads · 32 SIMDgroups × 32 threads</text>
    <text x="20" y="162" fill="#888" font-size="10">Cross-SIMDgroup RMSNorm via threadgroup memory</text>
  </g>

  <!-- Threadgroup memory detail -->
  <g transform="translate(430, 300)">
    <rect width="340" height="80" rx="8" fill="url(#cbg)"
          stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="170" y="20" text-anchor="middle" fill="#888"
          font-size="11">Threadgroup Memory (4KB)</text>
    <line x1="20" y1="28" x2="320" y2="28" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="48" fill="#ededed" font-size="10">partial_sums[32] — cross-SIMDgroup reduction</text>
    <text x="20" y="66" fill="#888" font-size="10">SG0 reduces 32 partial sums via simd_sum → broadcast</text>
  </g>

  <!-- Single dispatch indicator -->
  <g transform="translate(430, 395)">
    <rect width="340" height="28" rx="14"
          fill="#0070f3" fill-opacity="0.15" stroke="#0070f3" stroke-width="1" stroke-opacity="0.4"/>
    <text x="170" y="18" text-anchor="middle" fill="#0070f3" font-size="11">1 dispatch · 0 threadgroup barriers</text>
  </g>

  <!-- Bottom metrics -->
  <g transform="translate(0, 445)">
    <line x1="0" y1="0" x2="800" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="200" y="28" text-anchor="middle" fill="#555" font-size="10">Dispatch overhead: 5 × ~0.01ms</text>
    <text x="200" y="44" text-anchor="middle" fill="#555" font-size="10">Barrier latency: 4 × sync cost</text>
    <text x="600" y="28" text-anchor="middle" fill="#0070f3" font-size="10">Dispatch overhead: 1 × ~0.01ms</text>
    <text x="600" y="44" text-anchor="middle" fill="#0070f3" font-size="10">SIMD-only sync: ~0 additional cost</text>
  </g>
</svg>
